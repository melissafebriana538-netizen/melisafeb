<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BelajarYuk - Masuk atau Daftar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        .tab-active { border-bottom: 2px solid #2b7cee; color: #2b7cee; font-weight: 600; }
        body { font-family: 'Lexend', sans-serif; background: #0a0f18; }
    </style>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-gray-800 rounded-2xl shadow-xl overflow-hidden">
        <div class="p-6 pb-0 text-center">
            <div class="inline-flex items-center gap-2 bg-primary/10 px-4 py-2 rounded-full mb-4">
                <span class="material-symbols-outlined text-primary">menu_book</span>
                <span class="text-primary font-bold">BelajarYuk</span>
            </div>
            <div class="flex border-b border-gray-700 mb-6">
                <button id="tabLogin" onclick="showLogin()" class="flex-1 py-3 text-center font-medium tab-active">Masuk</button>
                <button id="tabRegister" onclick="showRegister()" class="flex-1 py-3 text-center font-medium text-gray-400 hover:text-primary">Daftar</button>
            </div>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="p-6 space-y-5">
            <div><label class="text-sm font-medium">Email</label><input id="loginEmail" type="email" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600" placeholder="nama@email.com"></div>
            <div><label class="text-sm font-medium">Password</label><input id="loginPassword" type="password" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600" placeholder="********"></div>
            <button onclick="loginUser()" class="w-full bg-primary hover:bg-primary/90 py-3 rounded-lg font-bold">Masuk</button>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="p-6 space-y-5 hidden">
            <div><label class="text-sm font-medium">Nama Lengkap</label><input id="regName" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600" placeholder="Nama Anda"></div>
            <div><label class="text-sm font-medium">Email</label><input id="regEmail" type="email" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600" placeholder="nama@email.com"></div>
            <div><label class="text-sm font-medium">Password</label><input id="regPassword" type="password" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600" placeholder="Minimal 8 karakter"></div>
            <div><label class="text-sm font-medium">Konfirmasi Password</label><input id="regConfirm" type="password" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600" placeholder="Ulangi password"></div>
            <div class="flex items-center gap-2"><input type="checkbox" id="terms"><label class="text-sm">Saya setuju <a onclick="alert('Syarat & Ketentuan')" class="text-primary cursor-pointer">Syarat & Ketentuan</a></label></div>
            <button onclick="registerUser()" class="w-full bg-primary hover:bg-primary/90 py-3 rounded-lg font-bold">Daftar</button>
        </div>
        <div class="text-center text-gray-500 text-xs pb-6">BelajarYuk - Dive In, Genius Out!</div>
    </div>

    <script>
        // Gunakan domain yang sama dengan tempat frontend diakses (sinauYuk.com)
        // Pastikan backend berjalan di port 3000 dan Apache/Laragon sebagai proxy
        const API = "http://localhost:3000/api";

        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('tabLogin').classList.add('tab-active');
            document.getElementById('tabRegister').classList.remove('tab-active');
        }

        function showRegister() {
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('tabRegister').classList.add('tab-active');
            document.getElementById('tabLogin').classList.remove('tab-active');
        }

        async function loginUser() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) return alert('Email dan password harus diisi');
            
            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                console.log('Response login:', data);
                
                if (res.ok) {
                    if (!data.token) {
                        console.error('Token tidak ditemukan dalam response:', data);
                        alert('Respons dari server tidak mengandung token. Periksa backend.');
                        return;
                    }
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    console.log('Token tersimpan:', localStorage.getItem('token'));
                    console.log('User tersimpan:', localStorage.getItem('user'));
                    
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.message || data.msg || 'Login gagal. Periksa email/password.');
                }
            } catch (err) {
                console.error(err);
                alert('Error: Pastikan backend berjalan di "http://localhost:3000/api" (port 80) melalui proxy Laragon/XAMPP, atau backend Node.js di port 3000 dengan CORS yang benar.');
            }
        }

        async function registerUser() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            const terms = document.getElementById('terms').checked;
            if (!name || !email || !password || !confirm) return alert('Semua field harus diisi');
            if (password.length < 8) return alert('Password minimal 8 karakter');
            if (password !== confirm) return alert('Password tidak cocok');
            if (!terms) return alert('Setujui syarat & ketentuan');
            try {
                const res = await fetch(`${API}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email,
                        password,
                        konfirmasiPassword: confirm,
                        name: name
                    })
                });
                const data = await res.json();
                console.log('Response register:', data);
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.message || data.msg || 'Registrasi gagal');
                }
            } catch (err) {
                console.error(err);
                alert('Error: Pastikan backend berjalan di "http://localhost:3000/api" (port 80) atau backend Node.js di port 3000 dengan CORS yang benar.');
            }
        }
    </script>
</body>
</html>
