<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BelajarYuk - Daftar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        body { font-family: 'Lexend', sans-serif; background: #0a0f18; }
        .tab-active { border-bottom: 2px solid #2b7cee; color: #2b7cee; font-weight: 600; }
        input:focus { outline: none; border-color: #2b7cee; box-shadow: 0 0 0 2px rgba(43,124,238,0.3); }
    </style>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-gray-800 rounded-2xl shadow-xl overflow-hidden">
        <div class="p-6 pb-0 text-center">
            <div class="inline-flex items-center gap-2 bg-primary/10 px-4 py-2 rounded-full mb-4">
                <span class="material-symbols-outlined text-primary">menu_book</span>
                <span class="text-primary font-bold">BelajarYuk</span>
            </div>
            <div class="flex border-b border-gray-700 mb-6">
                <a href="login.html" class="flex-1 py-3 text-center font-medium text-gray-400 hover:text-primary">Masuk</a>
                <span class="flex-1 py-3 text-center font-medium tab-active">Daftar</span>
            </div>
        </div>

        <!-- Form Registrasi -->
        <div id="registerForm" class="p-6 space-y-5">
            <div>
                <label class="text-sm font-medium">Nama Lengkap</label>
                <input id="regName" type="text" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:border-primary transition" placeholder="Nama Anda">
            </div>
            <div>
                <label class="text-sm font-medium">Email</label>
                <input id="regEmail" type="email" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:border-primary transition" placeholder="nama@email.com">
            </div>
            <div>
                <label class="text-sm font-medium">Password</label>
                <input id="regPassword" type="password" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:border-primary transition" placeholder="Minimal 8 karakter">
            </div>
            <div>
                <label class="text-sm font-medium">Konfirmasi Password</label>
                <input id="regConfirm" type="password" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:border-primary transition" placeholder="Ulangi password">
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" id="terms" class="w-4 h-4 accent-primary">
                <label class="text-sm">Saya setuju <a onclick="alert('Syarat & Ketentuan')" class="text-primary cursor-pointer hover:underline">Syarat & Ketentuan</a></label>
            </div>
            <button onclick="registerUser()" class="w-full bg-primary hover:bg-primary/90 py-3 rounded-lg font-bold transition">Daftar</button>
        </div>
        <div class="text-center text-gray-500 text-xs pb-6">BelajarYuk - Dive In, Genius Out!</div>
    </div>

    <script>
        const API = 'http://sinauYuk.com/api';

        async function registerUser() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            const terms = document.getElementById('terms').checked;

            if (!name || !email || !password || !confirm) {
                return alert('Semua field harus diisi');
            }
            if (password.length < 8) {
                return alert('Password minimal 8 karakter');
            }
            if (password !== confirm) {
                return alert('Password tidak cocok');
            }
            if (!terms) {
                return alert('Setujui syarat & ketentuan');
            }

            try {
                const res = await fetch(`${API}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name,
                        email,
                        password,
                        konfirmasiPassword: confirm
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.message || 'Registrasi gagal');
                }
            } catch (err) {
                alert('Error: Pastikan backend berjalan di http://sinauYuk.com (port 80) dan XAMPP/Node.js aktif.');
            }
        }
    </script>
</body>
</html>
